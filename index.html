<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Orb</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
        #idle-hint {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            user-select: none;
            pointer-events: none;
            white-space: nowrap;
        }
        #idle-hint.visible { animation: idle-pulse 2.8s ease-in-out infinite; }
        @keyframes idle-pulse {
            0%, 100% { opacity: 0.45; }
            50%      { opacity: 0.85; }
        }
        #idle-hint .arrow-keys {
            display: grid;
            grid-template-columns: repeat(3, 26px);
            grid-template-rows: repeat(2, 26px);
            gap: 4px;
            justify-content: center;
            margin: 0 auto 18px;
        }
        #idle-hint .key {
            border: 1px solid currentColor;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #idle-hint .key::before {
            content: "";
            width: 0;
            height: 0;
        }
        #idle-hint .key-up    { grid-column: 2; grid-row: 1; }
        #idle-hint .key-left  { grid-column: 1; grid-row: 2; }
        #idle-hint .key-down  { grid-column: 2; grid-row: 2; }
        #idle-hint .key-right { grid-column: 3; grid-row: 2; }
        #idle-hint .key-up::before {
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 6px solid currentColor;
        }
        #idle-hint .key-down::before {
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid currentColor;
        }
        #idle-hint .key-left::before {
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-right: 6px solid currentColor;
        }
        #idle-hint .key-right::before {
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 6px solid currentColor;
        }
    </style>
</head>
<body>
    <div id="idle-hint">
        <div class="arrow-keys">
            <div class="key key-up"></div>
            <div class="key key-left"></div>
            <div class="key key-down"></div>
            <div class="key key-right"></div>
        </div>
        <div class="hint-text">Use the arrow keys to move around</div>
    </div>
    <script type="module" src="/script.js"></script>
</body>
</html>
