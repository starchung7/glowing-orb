<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Orb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
        #idle-hint {
            position: absolute;
            z-index: 1100;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            user-select: none;
            pointer-events: none;
            white-space: nowrap;
        }
        #name-label {
            position: absolute;
            z-index: 1100;
            top: 24px;
            left: 28px;
            color: #fff;
            font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.20em;
            user-select: none;
            pointer-events: none;
        }
        #idle-hint.visible { animation: idle-pulse 2.8s ease-in-out infinite; }
        @keyframes idle-pulse {
            0%, 100% { opacity: 0.45; }
            50%      { opacity: 0.85; }
        }
        #idle-hint .arrow-keys {
            display: grid;
            grid-template-columns: repeat(3, 26px);
            grid-template-rows: repeat(2, 26px);
            gap: 4px;
            justify-content: center;
            margin: 0 auto 18px;
        }
        #idle-hint .key {
            border: 1px solid currentColor;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #idle-hint .key svg {
            width: 10px;
            height: 10px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.4;
            stroke-linejoin: round;
            stroke-linecap: round;
        }
        #idle-hint .key-up    { grid-column: 2; grid-row: 1; }
        #idle-hint .key-left  { grid-column: 1; grid-row: 2; }
        #idle-hint .key-down  { grid-column: 2; grid-row: 2; }
        #idle-hint .key-right { grid-column: 3; grid-row: 2; }
        /* Fullscreen fog veil for the world-boundary respawn. Opacity is driven
           from JS each frame; background colour is synced to the scene fog. */
        #fog-veil {
            position: absolute;
            inset: 0;
            background: #8a8aff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        /* Touch hint shown only on touch-primary (mobile/tablet) devices. */
        #idle-hint .hint-touch { display: none; }
        @media (pointer: coarse) {
            #idle-hint .arrow-keys { display: none; }
            #idle-hint .hint-desktop { display: none; }
            #idle-hint .hint-touch { display: block; }
        }
    </style>
</head>
<body>
    <div id="name-label">CADEN CHUNG</div>
    <div id="idle-hint">
        <div class="arrow-keys">
            <div class="key key-up"><svg viewBox="0 0 12 12"><polygon points="6,2.5 10,9 2,9"/></svg></div>
            <div class="key key-left"><svg viewBox="0 0 12 12"><polygon points="2.5,6 9,2 9,10"/></svg></div>
            <div class="key key-down"><svg viewBox="0 0 12 12"><polygon points="6,9.5 2,3 10,3"/></svg></div>
            <div class="key key-right"><svg viewBox="0 0 12 12"><polygon points="9.5,6 3,2 3,10"/></svg></div>
        </div>
        <div class="hint-text hint-desktop">Use the arrow keys to explore</div>
        <div class="hint-text hint-touch">Drag to explore</div>
    </div>
    <div id="fog-veil"></div>
    <script type="module" src="/script.js"></script>
</body>
</html>
